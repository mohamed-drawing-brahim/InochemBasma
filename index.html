<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Inochem | متجر النظافة الأفضل</title>
  <!-- روبوتو للعربية بخط عصري مع دعم الخطوط الآمنة -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (مجاني) للأيقونات -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: #f4f7fc;
      color: #1e2b37;
      line-height: 1.6;
      direction: rtl; /* المحتوى الرئيسي من اليمين لليسار */
    }

    .container {
      width: 90%;
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 15px;
    }

    /* الهيدر */
    header {
      background: linear-gradient(135deg, #0a4d7a, #0b6b9e);
      color: white;
      padding: 1.2rem 0;
      box-shadow: 0 6px 18px rgba(0, 40, 70, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .logo h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo i {
      color: #ffd966;
      font-size: 2.2rem;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      font-weight: 600;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 1.1rem;
      transition: 0.3s;
      border-bottom: 2px solid transparent;
      padding-bottom: 4px;
    }

    .nav-links a:hover {
      border-bottom-color: #ffd966;
      color: #ffd966;
    }

    /* قسم البطل (hero) */
    .hero {
      background: url('https://images.unsplash.com/photo-1563453392212-326f5e854473?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
      background-blend-mode: overlay;
      background-color: #3a6b92;
      color: white;
      padding: 5rem 0;
      text-align: center;
      margin-bottom: 3rem;
      border-radius: 0 0 50px 50px;
      box-shadow: inset 0 0 0 1000px rgba(6, 50, 80, 0.75);
    }

    .hero h2 {
      font-size: 3rem;
      margin-bottom: 0.8rem;
      font-weight: 700;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.4);
    }

    .hero p {
      font-size: 1.4rem;
      max-width: 750px;
      margin: 0 auto 2rem;
      opacity: 0.95;
    }

    .btn {
      display: inline-block;
      background-color: #f0c14b;
      color: #1e2b37;
      padding: 0.9rem 2.5rem;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 60px;
      text-decoration: none;
      transition: 0.3s;
      box-shadow: 0 8px 16px rgba(0,0,0,0.15);
      border: none;
      cursor: pointer;
    }

    .btn i {
      margin-right: 8px;
    }

    .btn:hover {
      background-color: #ffda7c;
      transform: translateY(-4px);
      box-shadow: 0 15px 25px rgba(0,0,0,0.25);
    }

    /* عنوان الأقسام */
    .section-title {
      text-align: center;
      font-size: 2.5rem;
      font-weight: 700;
      color: #0a4d7a;
      margin-bottom: 2.5rem;
      position: relative;
      padding-bottom: 15px;
    }

    .section-title::after {
      content: "";
      width: 120px;
      height: 4px;
      background: linear-gradient(to left, #0a4d7a, #4a9fd8);
      position: absolute;
      bottom: 0;
      right: 50%;
      transform: translateX(50%);
      border-radius: 4px;
    }

    /* شبكة المنتجات */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      margin: 3rem 0;
    }

    .product-card {
      background: white;
      border-radius: 30px 30px 20px 20px;
      overflow: hidden;
      box-shadow: 0 15px 30px rgba(0, 30, 50, 0.1);
      transition: 0.25s ease;
      display: flex;
      flex-direction: column;
      border: 1px solid #d9e9f5;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 45px rgba(7, 60, 100, 0.2);
    }

    .product-img {
      height: 220px;
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 10px;
    }

    /* شارة مميزات */
    .badge {
      background: #ffb347;
      color: #1d2c3a;
      font-weight: 700;
      padding: 0.3rem 1.2rem;
      border-radius: 50px;
      font-size: 0.85rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .badge i {
      font-size: 0.8rem;
    }

    .product-info {
      padding: 1.5rem 1.2rem 1.5rem;
      background: white;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .product-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #124263;
      margin-bottom: 0.4rem;
    }

    .product-desc {
      color: #3e5a6b;
      margin-bottom: 1rem;
      font-size: 0.95rem;
      flex-grow: 1;
    }

    .product-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
      border-top: 1px solid #e1eef9;
      padding-top: 1rem;
    }

    .price {
      font-size: 1.7rem;
      font-weight: 800;
      color: #0a4d7a;
    }

    .price small {
      font-size: 1rem;
      font-weight: 400;
      color: #5885a5;
    }

    .add-to-cart {
      background: #0a4d7a;
      border: none;
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 6px 12px rgba(7, 70, 120, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .add-to-cart:hover {
      background: #1273b3;
      transform: scale(1.1);
    }

    /* قسم المميزات */
    .features {
      background: white;
      border-radius: 60px 60px 30px 30px;
      padding: 3rem 1.5rem;
      margin: 4rem 0;
      box-shadow: 0 10px 30px rgba(0, 30, 50, 0.05);
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 2.5rem;
      text-align: center;
    }

    .feature-item i {
      font-size: 3rem;
      color: #0f6b9e;
      background: #e1f0fa;
      padding: 1.3rem;
      border-radius: 50%;
      margin-bottom: 1rem;
    }

    .feature-item h4 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .feature-item p {
      color: #365f7a;
    }

    /* الفوتر */
    footer {
      background: #0b3450;
      color: #e0edf5;
      padding: 2.5rem 0;
      margin-top: 4rem;
      border-radius: 60px 60px 0 0;
    }

    .footer-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 2rem;
    }

    .footer-info p {
      margin: 0.5rem 0;
      font-size: 1.1rem;
    }

    .footer-info i {
      margin-left: 8px;
      color: #ffcd7e;
    }

    .social a {
      color: white;
      font-size: 1.8rem;
      margin-right: 1.2rem;
      transition: 0.2s;
      display: inline-block;
    }

    .social a:hover {
      color: #f0c14b;
      transform: scale(1.15);
    }

    /* عربة التسوق الصغيرة (ثابتة) */
    .cart-fixed {
      position: fixed;
      bottom: 30px;
      left: 30px;
      background: #0a4d7a;
      color: white;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 8px 20px rgba(0, 60, 110, 0.5);
      cursor: pointer;
      transition: 0.2s;
      z-index: 99;
      border: 3px solid #ffcd7e;
    }

    .cart-fixed:hover {
      background: #126ead;
      transform: scale(1.05);
    }

    .cart-fixed span {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #e63946;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 40px;
      border: 2px solid white;
    }

    /* استجابة للجوال */
    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        gap: 15px;
      }
      .nav-links {
        gap: 1.2rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .hero h2 {
        font-size: 2rem;
      }
      .hero p {
        font-size: 1.1rem;
      }
      .section-title {
        font-size: 2rem;
      }
      .footer-content {
        flex-direction: column;
        text-align: center;
      }
      .social a {
        margin: 0 0.6rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container header-content">
      <div class="logo">
        <h1><i class="fas fa-pump-soap"></i> مواد تنظيف</h1>
      </div>
      <div class="nav-links">
        <a href="#">الرئيسية</a>
        <a href="shop.html">المتجر</a>
        <a href="#">اتصل بنا</a>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h2>مواد تنظيف أصلية وبأفضل الأسعار</h2>
      <p>نوفر لكم أجود مواد النظافة للمنزل والمكاتب والمنشآت. عناية فائقة بنظافة لا مثيل لها.</p>
      <a href="shop.html" class="btn"><i class="fas fa-basket-shopping"></i> تسوق الآن</a>
    </div>
  </section>
